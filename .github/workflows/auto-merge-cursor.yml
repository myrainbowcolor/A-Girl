name: Auto-merge Cursor PRs

# Cloud Agent / Automations：PR 分支通常为 cursor/*，作者可能是 app/cursor 或成员账号

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
  workflow_run:
    workflows: ["Dialogue Quality"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write
  checks: read

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_run' ||
      (github.event_name == 'pull_request' && startsWith(github.event.pull_request.head.ref, 'cursor/'))
    steps:
      - uses: actions/checkout@v4

      - name: Resolve target PR
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          REPO="${{ github.repository }}"

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "pr_number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BRANCH="${{ github.event.workflow_run.head_branch }}"
          if [ -z "$BRANCH" ] || [[ ! "$BRANCH" == cursor/* ]]; then
            echo "No cursor/* branch on workflow_run"
            exit 0
          fi

          # 同仓库 PR 用分支名即可；owner:branch 在同 repo 下会查不到
          PR_NUMBER=$(gh pr list --repo "$REPO" --state open \
            --head "$BRANCH" \
            --json number \
            --jq '.[0].number // empty')

          if [ -z "$PR_NUMBER" ]; then
            echo "No open PR for branch $BRANCH"
            exit 0
          fi

          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Mark draft PR ready for review
        if: steps.resolve.outputs.pr_number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          PR="${{ steps.resolve.outputs.pr_number }}"
          if gh pr view "$PR" --json isDraft -q '.isDraft' | grep -qx true; then
            gh pr ready "$PR"
            echo "Marked PR #$PR ready"
            sleep 10
          fi

      - name: Wait for checks (best effort, up to 15 min)
        if: steps.resolve.outputs.pr_number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh pr checks "${{ steps.resolve.outputs.pr_number }}" --watch --interval 15 \
            || echo "checks watch ended (may still attempt merge)"

      - name: Squash merge cursor PR
        if: steps.resolve.outputs.pr_number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          PR="${{ steps.resolve.outputs.pr_number }}"

          if gh pr view "$PR" --json isDraft -q '.isDraft' | grep -qx true; then
            echo "::warning::PR #$PR still draft — skip merge"
            exit 0
          fi

          if gh pr view "$PR" --json mergeable -q '.mergeable' | grep -qx 'false'; then
            echo "::warning::PR #$PR not mergeable — skip auto merge"
            gh pr comment "$PR" --body "⚠️ **Auto-merge 跳过**：PR 不可合并（冲突或检查未通过）。请手动 rebase/修复。"
            exit 0
          fi

          if gh pr merge "$PR" --squash --delete-branch; then
            echo "Merged PR #$PR"
          else
            echo "::warning::Direct merge failed; enabling GitHub auto-merge as fallback"
            gh pr merge "$PR" --auto --squash || true
          fi

name: Auto-merge Cursor PRs

# Cloud Agent / Automations：PR 分支通常为 cursor/*，作者可能是 app/cursor 或成员账号

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
  workflow_run:
    workflows: ["Dialogue Quality"]
    types: [completed]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "手动重试合并的 PR 号"
        required: true
        type: number

permissions:
  contents: write
  pull-requests: write
  checks: read

concurrency:
  group: auto-merge-${{ github.event.pull_request.number || github.event.inputs.pr_number || github.event.workflow_run.id || github.run_id }}
  cancel-in-progress: true

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'workflow_run' ||
      (github.event_name == 'pull_request' && startsWith(github.event.pull_request.head.ref, 'cursor/'))
    steps:
      - uses: actions/checkout@v4

      - name: Resolve target PR
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          REPO="${{ github.repository }}"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "pr_number=${{ github.event.inputs.pr_number }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "pr_number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          RUN_ID="${{ github.event.workflow_run.id }}"
          PR_NUMBER=$(gh api "repos/$REPO/actions/runs/$RUN_ID" --jq '.pull_requests[0].number // empty')

          if [ -z "$PR_NUMBER" ]; then
            BRANCH="${{ github.event.workflow_run.head_branch }}"
            if [ -n "$BRANCH" ] && [[ "$BRANCH" == cursor/* ]]; then
              PR_NUMBER=$(gh pr list --repo "$REPO" --state open \
                --head "$BRANCH" \
                --json number \
                --jq '.[0].number // empty')
            fi
          fi

          if [ -z "$PR_NUMBER" ]; then
            echo "No open PR resolved from workflow_run"
            exit 0
          fi

          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Mark draft PR ready for review
        if: steps.resolve.outputs.pr_number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          PR="${{ steps.resolve.outputs.pr_number }}"
          if gh pr view "$PR" --json isDraft -q '.isDraft' | grep -qx true; then
            gh pr ready "$PR"
            echo "Marked PR #$PR ready"
            sleep 10
          fi

      - name: Wait for dialogue-quality (exclude self — avoid deadlock)
        if: steps.resolve.outputs.pr_number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          PR="${{ steps.resolve.outputs.pr_number }}"
          echo "Waiting for dialogue-quality on PR #$PR..."
          for i in $(seq 1 40); do
            CONC=$(gh pr view "$PR" --json statusCheckRollup -q \
              '[.statusCheckRollup[] | select(.name == "dialogue-quality") | .conclusion] | first // empty')
            if [ "$CONC" = "SUCCESS" ]; then
              echo "dialogue-quality passed"
              exit 0
            fi
            if [ "$CONC" = "FAILURE" ] || [ "$CONC" = "CANCELLED" ]; then
              echo "::warning::dialogue-quality $CONC — skip auto merge"
              exit 1
            fi
            echo "attempt $i/40: dialogue-quality not ready yet"
            sleep 15
          done
          echo "::warning::Timed out waiting for dialogue-quality"

      - name: Squash merge cursor PR
        if: steps.resolve.outputs.pr_number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          PR="${{ steps.resolve.outputs.pr_number }}"

          if gh pr view "$PR" --json isDraft -q '.isDraft' | grep -qx true; then
            echo "::warning::PR #$PR still draft — skip merge"
            exit 0
          fi

          if gh pr view "$PR" --json mergeable -q '.mergeable' | grep -qx 'false'; then
            echo "::warning::PR #$PR not mergeable — skip auto merge"
            gh pr comment "$PR" --body "⚠️ **Auto-merge 跳过**：PR 不可合并（冲突或检查未通过）。请手动 rebase/修复。"
            exit 0
          fi

          if gh pr merge "$PR" --squash --delete-branch; then
            echo "Merged PR #$PR"
          else
            echo "::warning::Direct merge failed; enabling GitHub auto-merge as fallback"
            gh pr merge "$PR" --auto --squash || true
          fi
